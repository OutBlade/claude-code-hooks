<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" width="620" height="360">
  <defs>
    <style>
      .bg       { fill: #0d1117; }
      .titlebar { fill: #161b22; }
      .dot-r    { fill: #ff5f57; }
      .dot-y    { fill: #febc2e; }
      .dot-g    { fill: #28c840; }
      .mono     { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
      .dim      { fill: #8b949e; }
      .white    { fill: #e6edf3; }
      .green    { fill: #3fb950; }
      .red      { fill: #f85149; }
      .orange   { fill: #e8630a; }
      .yellow   { fill: #d29922; }
      .border   { fill: none; stroke: #30363d; stroke-width: 1; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect class="bg" width="620" height="360" rx="10"/>
  <rect class="border" width="619" height="359" x="0.5" y="0.5" rx="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="620" height="38" rx="10"/>
  <rect class="titlebar" x="0" y="20" width="620" height="18"/>

  <!-- Traffic lights -->
  <circle class="dot-r" cx="20" cy="19" r="6"/>
  <circle class="dot-y" cx="40" cy="19" r="6"/>
  <circle class="dot-g" cx="60" cy="19" r="6"/>

  <!-- Title -->
  <text class="mono dim" x="240" y="24" text-anchor="middle" font-size="12">bash — Claude Code</text>

  <!-- Content area -->

  <!-- Prompt line 1: Claude running a command -->
  <text class="mono dim" x="20" y="72">Claude is running:</text>
  <text class="mono white" x="20" y="95">  <tspan class="dim">$</tspan> rm -rf /var/www/html /etc/nginx</text>

  <!-- Divider -->
  <line x1="20" y1="112" x2="600" y2="112" stroke="#30363d" stroke-width="1"/>

  <!-- Hook output header -->
  <text class="mono orange" x="20" y="132">bash-guard</text>
  <text class="mono dim" x="108" y="132">intercepted a destructive command</text>

  <!-- Block message box -->
  <rect fill="#1c1f26" x="20" y="142" width="580" height="110" rx="6"/>
  <rect fill="none" stroke="#f85149" stroke-width="1" x="20" y="142" width="580" height="110" rx="6"/>

  <!-- Left red bar -->
  <rect fill="#f85149" x="20" y="142" width="4" height="110" rx="2"/>

  <text class="mono red" x="36" y="166">  BLOCKED</text>
  <text class="mono white" x="36" y="186">  bash-guard: Blocked: recursive delete starting from current directory</text>
  <text class="mono dim" x="36" y="206">  Blocked command: rm -rf /var/www/html /etc/nginx</text>
  <text class="mono dim" x="36" y="226">  Use targeted deletion: rm -rf /var/www/html/cache instead</text>

  <!-- Divider -->
  <line x1="20" y1="268" x2="600" y2="268" stroke="#30363d" stroke-width="1"/>

  <!-- Claude response -->
  <text class="mono dim" x="20" y="288">Claude is adjusting its approach...</text>
  <text class="mono green" x="20" y="312">  I'll delete only the specific cache directory instead of the</text>
  <text class="mono green" x="20" y="330">  entire /var/www/html path. Running: rm -rf /var/www/html/cache</text>

  <!-- Cursor blink -->
  <rect fill="#e6edf3" x="20" y="344" width="8" height="14" rx="1" opacity="0.8"/>
</svg>
