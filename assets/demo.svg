<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420">
<defs>
  <style>
    .bg       { fill: #0d1117; }
    .titlebar { fill: #161b22; }
    .border   { fill: none; stroke: #30363d; stroke-width: 1; }
    .mono     { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
    .dim      { fill: #8b949e; }
    .white    { fill: #e6edf3; }
    .green    { fill: #3fb950; }
    .red      { fill: #f85149; }
    .orange   { fill: #e8630a; }
    .yellow   { fill: #d29922; }
    .blue     { fill: #58a6ff; }
    .box-bg   { fill: #1c1f26; }
    .box-bdr  { fill: none; stroke: #f85149; stroke-width: 1; }
    .ok-bdr   { fill: none; stroke: #3fb950; stroke-width: 1; }

    /* Line-by-line fade-in animation */
    .l1  { opacity:0; animation: fi 0.15s 0.3s  forwards; }
    .l2  { opacity:0; animation: fi 0.15s 0.9s  forwards; }
    .l3  { opacity:0; animation: fi 0.15s 1.5s  forwards; }
    .l4  { opacity:0; animation: fi 0.15s 2.2s  forwards; }
    .l5  { opacity:0; animation: fi 0.15s 2.5s  forwards; }
    .l6  { opacity:0; animation: fi 0.15s 2.8s  forwards; }
    .l7  { opacity:0; animation: fi 0.15s 3.1s  forwards; }
    .l8  { opacity:0; animation: fi 0.15s 3.4s  forwards; }
    .l9  { opacity:0; animation: fi 0.15s 3.7s  forwards; }
    .l10 { opacity:0; animation: fi 0.15s 4.5s  forwards; }
    .l11 { opacity:0; animation: fi 0.15s 4.8s  forwards; }
    .l12 { opacity:0; animation: fi 0.15s 5.1s  forwards; }
    .l13 { opacity:0; animation: fi 0.15s 5.4s  forwards; }
    .l14 { opacity:0; animation: fi 0.15s 6.3s  forwards; }
    .l15 { opacity:0; animation: fi 0.15s 6.6s  forwards; }
    .l16 { opacity:0; animation: fi 0.15s 6.9s  forwards; }

    /* Block box fade */
    .box { opacity:0; animation: fi 0.3s 2.1s forwards; }
    .ok-box { opacity:0; animation: fi 0.3s 6.2s forwards; }

    /* Cursor blink */
    .cur { animation: blink 1s 7.0s step-end infinite; }

    @keyframes fi    { to { opacity: 1; } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  </style>
</defs>

<!-- Window -->
<rect class="bg" width="640" height="420" rx="10"/>
<rect class="border" width="639" height="419" x="0.5" y="0.5" rx="10"/>
<rect class="titlebar" width="640" height="36" rx="10"/>
<rect class="titlebar" x="0" y="18" width="640" height="18"/>
<circle fill="#ff5f57" cx="20" cy="18" r="5.5"/>
<circle fill="#febc2e" cx="38" cy="18" r="5.5"/>
<circle fill="#28c840" cx="56" cy="18" r="5.5"/>
<text class="mono dim" x="320" y="23" text-anchor="middle" font-size="12">bash — Claude Code</text>

<!-- === SECTION 1: Claude tries something dangerous === -->

<text class="mono dim l1" x="20" y="62">Claude is working on your codebase...</text>

<!-- Claude's intent -->
<text class="mono dim l2" x="20" y="85">  Attempting to run:</text>
<text class="mono white l3" x="20" y="103">
  <tspan class="dim">$</tspan>  rm -rf ./node_modules ./dist .cache
</text>

<!-- Block box -->
<g class="box">
  <rect class="box-bg" x="20" y="113" width="600" height="106" rx="5"/>
  <rect class="box-bdr" x="20" y="113" width="600" height="106" rx="5"/>
  <rect fill="#f85149" x="20" y="113" width="4" height="106" rx="2"/>
</g>

<text class="mono l4" x="36" y="135"><tspan class="red" font-weight="bold">  BLOCKED</tspan><tspan class="dim"> — bash-guard</tspan></text>
<text class="mono dim l5" x="36" y="155">  Matched pattern: rm -rf on current directory</text>
<text class="mono dim l6" x="36" y="173">  Command: rm -rf ./node_modules ./dist .cache</text>
<text class="mono yellow l7" x="36" y="193">  Suggestion: delete targets individually, not with a glob from root</text>
<text class="mono dim l8" x="36" y="209">  Claude must find a safer approach.</text>

<!-- Claude reconsiders -->
<text class="mono dim l9" x="20" y="235">Claude is adjusting...</text>

<!-- === SECTION 2: git guard === -->

<text class="mono dim l10" x="20" y="262">  Attempting to run:</text>
<text class="mono white l11" x="20" y="280">
  <tspan class="dim">$</tspan>  git push --force origin main
</text>

<g class="box" style="animation-delay:3.6s">
  <rect class="box-bg" x="20" y="290" width="600" height="60" rx="5"/>
  <rect class="box-bdr" x="20" y="290" width="600" height="60" rx="5"/>
  <rect fill="#f85149" x="20" y="290" width="4" height="60" rx="2"/>
</g>

<text class="mono l12" x="36" y="312"><tspan class="red" font-weight="bold">  BLOCKED</tspan><tspan class="dim"> — git-guard</tspan></text>
<text class="mono dim l13" x="36" y="330">  Force-push to main/master is blocked. Use a feature branch and PR.</text>

<!-- === SECTION 3: safe approach === -->
<g class="ok-box">
  <rect fill="#0d1f12" x="20" y="358" width="600" height="45" rx="5"/>
  <rect class="ok-bdr" x="20" y="358" width="600" height="45" rx="5"/>
  <rect fill="#3fb950" x="20" y="358" width="4" height="45" rx="2"/>
</g>

<text class="mono l14" x="36" y="376"><tspan class="green">  Claude:</tspan><tspan class="dim"> Understood. I'll delete targets explicitly:</tspan></text>
<text class="mono white l15" x="36" y="394">  <tspan class="dim">$</tspan>  rm -rf node_modules &amp;&amp; rm -rf dist &amp;&amp; rm -rf .cache</text>

<!-- Cursor -->
<rect class="cur" fill="#e6edf3" x="20" y="406" width="8" height="13" rx="1"/>
</svg>
